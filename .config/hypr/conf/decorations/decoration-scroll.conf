# -----------------------------------------------------
# Decorations - Scroll Layout
# Pensato per il layout a nastro orizzontale:
# - border attivo ben visibile per capire la finestra corrente
# - shadow che aiuta la profondità tra colonne affiancate
# - blur leggero e veloce (non pesante come liquid glass)
# - dim moderato per evidenziare la colonna attiva
# -----------------------------------------------------

group {
    col.border_active          = $primary
    col.border_inactive        = $outline
    col.border_locked_active   = $tertiary
    col.border_locked_inactive = $outline_variant

    groupbar {
        col.active          = $primary_container
        col.inactive        = $surface_container
        col.locked_active   = $tertiary_container
        col.locked_inactive = $surface_container_low
        font_size           = 12
        height              = 22
        gradients           = true
        render_titles       = true
    }
}

decoration {
    rounding = 12

    blur {
        enabled          = true
        size             = 6
        passes           = 3
        new_optimizations = true
        xray             = false
        ignore_opacity   = false
        noise            = 0.012
        contrast         = 1.1
        brightness       = 1.0
        vibrancy         = 0.2
        vibrancy_darkness = 0.1
        popups           = true
        popups_ignorealpha = 0.4
        special          = true
    }

    shadow {
        enabled        = true
        range          = 20
        render_power   = 3
        # Ombra laterale destra: aiuta a distinguere le colonne nel nastro
        offset         = 4 4
        color          = rgba(00000077)
        color_inactive = rgba(00000033)
        scale          = 1.0
    }

    # Dimming moderato: la finestra attiva risalta, le altre si ritirano
    # senza sparire — utile quando hai 2-3 colonne visibili
    dim_inactive  = true
    dim_strength  = 0.12
    dim_special   = 0.25
    dim_around    = 0.35
}
