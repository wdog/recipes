###################
### KEYBINDINGS ###
###################
# $myKey = ALT  |  $mainMod = SUPER


# ========================================
# Application Launchers
# ========================================
bind = $myKey, return, exec, $terminal
bind = $myKey, D, exec, $menu
bind = $myKey, N, exec, ~/bin/network-chooser
bind = $mainMod, V, exec, cliphist list | fuzzel -d | cliphist decode | wl-copy


# ========================================
# System & Utilities
# ========================================
bind = $myKey, R, exec, ~/.config/waybar/launch.sh
bind = $mainMod, W, exec, ~/.config/matugen/wallpaper-picker.sh
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Escape, exec, nwg-bar -p top -mt 200
bind = $mainMod, R, exec, hyprctl reload
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/keybindings-cheatsheet.sh


# ========================================
# Focus Navigation
# ========================================
bind = $myKey, left, movefocus, l
bind = $myKey, right, movefocus, r
bind = $myKey, up, movefocus, u
bind = $myKey, down, movefocus, d
bind = $myKey, tab, cyclenext
bind = SHIFT, tab, focuscurrentorlast


# ========================================
# Window Management
# ========================================
bind = $myKey, Q, killactive
bind = $myKey, F, fullscreen, 1
bind = $myKey, T, togglefloating
bind = $myKey, T, resizeactive, exact 50% 50%
bind = $myKey, T, centerwindow
binde = $myKey, plus, resizeactive, 50 50
binde = $myKey, minus, resizeactive, -50 -50
bind = $myKey SHIFT, left, movetoworkspace, r-1
bind = $myKey SHIFT, right, movetoworkspace, r+1
# bind = $myKey SHIFT, up, movewindow, u
# bind = $myKey SHIFT, down, movewindow, d
bind = $myKey, I, swapnext
bind = $myKey SHIFT, J, exec, hyprctl --batch 'dispatch swapnext prev ; dispatch focuscurrentorlast'
bind = $myKey SHIFT, K, exec, hyprctl --batch 'dispatch swapnext ; dispatch focuscurrentorlast'
bind = $myKey SHIFT, M, layoutmsg, swapwithmaster
bind = $myKey $mainMod, up, swapwindow, u
bind = $myKey $mainMod, down, swapwindow, d
bind = $myKey CTRL, up, exec, hyprctl --batch "dispatch movewindow l ; dispatch movewindow d"
bind = $myKey CTRL, down, exec, hyprctl --batch "dispatch movewindow r ; dispatch movewindow u"


# ========================================
# Layout — Switch & Presets
# ========================================
bind = $myKey $mainMod, 1, exec, hyprctl --batch 'keyword general:layout dwindle ; keyword dwindle:force_split 0 ; keyword dwindle:preserve_split true'
bind = $myKey $mainMod, 2, exec, hyprctl --batch 'keyword general:layout master ; keyword master:mfact 0.70 ; keyword master:new_status slave ; dispatch layoutmsg orientationleft'
bind = $myKey $mainMod, 3, exec, hyprctl keyword general:layout scrolling


# ========================================
# Layout — Dwindle
# ========================================
bind = $myKey, J, layoutmsg, togglesplit
bind = $myKey, P, pseudo


# ========================================
# Layout — Master
# ========================================
bind = $myKey $mainMod, K, layoutmsg, rollnext
bind = $myKey $mainMod, J, layoutmsg, rollprev
bind = $myKey $mainMod, H, layoutmsg, orientationleft
bind = $myKey $mainMod, L, layoutmsg, orientationtop
bind = $myKey $mainMod, M, layoutmsg, swapwithmaster


# ========================================
# Workspace Switching
# ========================================
bind = $myKey, 1, workspace, 1
bind = $myKey, 2, workspace, 2
bind = $myKey, 3, workspace, 3
bind = $myKey, 4, workspace, 4
bind = $myKey, 5, workspace, 5
bind = $myKey, 6, workspace, 6
bind = $myKey, 7, workspace, 7
bind = $myKey, 8, workspace, 8
bind = $myKey, 9, workspace, 9
bind = $myKey, 0, workspace, 10


# ========================================
# Move Window to Workspace
# ========================================
bind = $myKey SHIFT, 1, movetoworkspace, 1
bind = $myKey SHIFT, 2, movetoworkspace, 2
bind = $myKey SHIFT, 3, movetoworkspace, 3
bind = $myKey SHIFT, 4, movetoworkspace, 4
bind = $myKey SHIFT, 5, movetoworkspace, 5
bind = $myKey SHIFT, 6, movetoworkspace, 6
bind = $myKey SHIFT, 7, movetoworkspace, 7
bind = $myKey SHIFT, 8, movetoworkspace, 8
bind = $myKey SHIFT, 9, movetoworkspace, 9
bind = $myKey SHIFT, 0, movetoworkspace, 10
bind = $myKey CTRL, right, workspace, e+1
bind = $myKey CTRL, left, workspace, e-1


# ========================================
# Monitor Focus
# ========================================


# ========================================
# Mouse Bindings
# ========================================
bindm = $myKey, mouse:272, movewindow
bindm = $myKey, mouse:273, resizewindow


# ========================================
# Media — Audio
# ========================================
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% && ~/.config/hypr/scripts/volume.sh
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% && ~/.config/hypr/scripts/volume.sh
bindel = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle


# ========================================
# Media — Brightness
# ========================================
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


# ========================================
# Media — Player Controls
# ========================================
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
