# -----------------------------------------------------
# Animations - Scroll Layout
# Ottimizzato per hyprland-plugins/hyprscrolling o layout a nastro
# Fluido, veloce, senza rimbalzi che interferiscono con lo scrolling
# -----------------------------------------------------
animations {
    enabled = true

    # Curva principale: ingresso rapido, decelerazione naturale (ease-out expo)
    bezier = swift,    0.16, 1, 0.3, 1

    # Per il movimento delle finestre nel nastro: leggera inerzia
    bezier = scroll,   0.25, 1, 0.5, 1

    # Per uscita: dissolve rapido senza sliding
    bezier = fadeOut,  0.4, 0, 0.6, 1

    # Finestre: slide laterale veloce — coerente con la direzione del nastro
    animation = windowsIn,   1, 4, swift,   slide
    animation = windowsOut,  1, 3, fadeOut, slide

    # Il cuore: movimento delle finestre nel nastro quando si scrolla/riposiziona
    animation = windowsMove, 1, 4, scroll

    # Workspace: nastro continuo orizzontale, nessun fade pesante
    animation = workspaces,        1, 4, scroll,  slide
    animation = specialWorkspace,  1, 4, swift,   slidevert

    # Fade: veloce, non distrae
    animation = fadeIn,   1, 3, swift
    animation = fadeOut,  1, 3, fadeOut
    animation = fadeDim,  1, 4, swift

    # Layer (notifiche, launcher): slide verticale rapida
    animation = layers,       1, 3, swift, slide
    animation = layersIn,     1, 3, swift, slide
    animation = layersOut,    1, 3, fadeOut, slide

    # Border: fade morbido al cambio focus
    bezier = borderFade, 0.4, 0, 0.2, 1
    animation = border,      1, 6, borderFade
    animation = borderangle, 0, 1, default
}
