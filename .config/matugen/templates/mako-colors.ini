# Material You colors

background-color={{colors.tertiary_container.default.hex}}
text-color={{colors.on_surface.default.hex}}
border-color={{colors.outline_variant.default.hex}}
progress-color=over {{colors.on_tertiary_fixed.default.hex}}
# Per-mode settings

[mode=do-not-disturb]
invisible=1
on-notify=none

[mode=silent]
on-notify=none

[urgency=low]
background-color={{colors.secondary_container.default.hex}}
text-color={{colors.on_secondary_container.default.hex}}
border-color={{colors.secondary.default.hex}}

[urgency=normal]
background-color={{colors.surface_container_high.default.hex}}
text-color={{colors.on_surface.default.hex}}
border-color={{colors.outline_variant.default.hex}}

[urgency=high]
background-color={{colors.error_container.default.hex}}
text-color={{colors.on_error_container.default.hex}}
border-color={{colors.error.default.hex}}

