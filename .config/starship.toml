palette = "gruvbox_rainbow"

format = """
$username\
[оВ∞](bg:color_yellow fg:color_orange)\
$directory\
[оВ∞](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$git_state\
[оВ∞](fg:color_aqua bg:color_blue)\
$python\
[оВ∞](fg:color_blue)\
$line_break$character"""

[palettes.gruvbox_rainbow]
color_fg0 = "#fbf1c7"
color_bg1 = "#3c3836"
color_bg3 = "#665c54"
color_green = "#b8bb26"
color_orange = "#d65d0e"
color_yellow = "#d79921"
color_aqua = "#003E50"
color_blue = "#458588"
color_purple = "#b16286"
color_red = "#cc241d"

[line_break]
disabled = false

[character]
success_symbol = '[вЭѓ](bold color_green)'
error_symbol = '[вЭѓ](bold color_red)'
format = '$symbol '

[username]
show_always = true
style_user = 'bg:color_orange fg:color_fg0'
style_root = 'bg:color_orange fg:color_red'
format = '[ $user ]($style)'

[directory]
style = 'bg:color_yellow fg:color_bg1'
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "вА¶/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "рЯУД "
"Downloads" = "рЯУ• "
"Music" = "рЯОµ "
"Pictures" = "рЯЦЉпЄП "
"Videos" = "рЯОђ "
"Desktop" = "рЯЦ•пЄП "
"Projects" = "рЯУБ "
"~" = "рЯП† "
"tmp" = "рЯЧСпЄП "
"tests" = "рЯІ™ "
"build" = "рЯФ® "
"node_modules" = "рЯУ¶ "
".git" = "рЯФА "
".github" = "рЯРЩ "
"images" = "рЯЦЉпЄП "
"fonts" = "рЯФ§ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[оЙА PICKING](bold red)'

[git_status]
style = 'bg:color_aqua fg:color_fg0'
format = '[ $all_status$ahead_behind]($style)'
modified = '[пБА +$count ](fg:color_yellow bg:color_aqua)'
untracked = '[пБЩ $count](fg:color_orange bg:color_aqua)'
deleted = '[пЗЄ -$count](fg:color_red bg:color_aqua)'
staged = '[пАМ ++$count](fg:color_green bg:color_aqua)'
conflicted = '[пБ± $count](fg:color_red bg:color_aqua)'
stashed = '[пЖЗ $count](fg:color_purple bg:color_aqua)'
renamed = '[пАЂ $count](fg:color_orange bg:color_aqua)'
ahead = '[ пХЬ $count](fg:color_green bg:color_aqua)'
behind = '[ пХД $count](fg:color_red bg:color_aqua)'
diverged = '[ пХЬ ${ahead_count} пХД ${behind_count}](fg:color_orange bg:color_aqua)'

[git_metrics]
disabled = false
format = '[ пЗЮ ](fg:color_fg0 bg:color_aqua)[+$added](fg:color_green bg:color_aqua)[ -$deleted ](fg:color_red bg:color_aqua)'
added_style = ''
deleted_style = ''

[git_branch]
symbol = 'оВ† '
style = 'bg:color_aqua fg:color_fg0'
# format = '[ $symbol $branch ]($style)'
format = '[ $symbol$branch(:$remote_branch)]($style)'

[git_commit]
# format = '[$hash $tag ]($style)'
format = '[ оЬ• $hash ]($style)'
commit_hash_length = 5
only_detached = false
tag_symbol = 'пРТ '
style = 'bg:color_aqua fg:color_blue'

[sudo]
style = 'bg:#2C3E50'
symbol = 'рЯСњ '
disabled = true

[python]
symbol = 'рЯРН'
style = 'bg:color_blue fg:color_fg0'
format = '[ $symbol$pyenv_prefix($version)(\($virtualenv\)) ]($style)'
pyenv_version_name = false
